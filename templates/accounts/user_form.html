{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="fw-bold mb-0 text-primary"><i class="fas fa-user-edit me-2"></i>{{ title }}</h5>
            </div>
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            {% if edit_mode %}<i class="fas fa-save me-2"></i>حفظ التعديلات{% else %}<i class="fas fa-user-plus me-2"></i>إنشاء المستخدم{% endif %}
                        </button>
                        <a href="{% url 'user_list' %}" class="btn btn-outline-secondary px-4">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
