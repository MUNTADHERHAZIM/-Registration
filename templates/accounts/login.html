<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام شؤون الطلاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0d1257 0%, #1a237e 50%, #283593 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at center, rgba(57,73,171,0.3) 0%, transparent 60%);
        }
        .circles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none;
        }
        .circles li {
            position: absolute; display: block; list-style: none;
            width: 20px; height: 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 15s linear infinite;
        }
        .circles li:nth-child(1){width:80px;height:80px;left:25%;animation-delay:0s;animation-duration:10s}
        .circles li:nth-child(2){width:20px;height:20px;left:10%;animation-delay:2s;animation-duration:12s}
        .circles li:nth-child(3){width:20px;height:20px;left:70%;animation-delay:4s;animation-duration:8s}
        .circles li:nth-child(4){width:40px;height:40px;left:40%;animation-delay:0s;animation-duration:15s}
        .circles li:nth-child(5){width:25px;height:25px;left:65%;animation-delay:0s;animation-duration:9s}
        @keyframes float {
            0%{bottom:-150px;opacity:0.5}
            100%{bottom:200%;opacity:0;transform:translateX(100px)}
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 40px;
            width: 100%; max-width: 440px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            position: relative; z-index: 10;
            backdrop-filter: blur(10px);
        }
        .logo-wrap {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #1a237e, #3949ab);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(26,35,126,0.4);
        }
        .form-control {
            border-radius: 12px; padding: 12px 16px;
            border: 2px solid #e0e0e0;
            font-family: 'Cairo', sans-serif; font-size: 14px;
        }
        .form-control:focus {
            border-color: #3949ab;
            box-shadow: 0 0 0 3px rgba(57,73,171,0.15);
        }
        .input-group-text {
            border-radius: 12px 0 0 12px;
            border: 2px solid #e0e0e0; border-left: 0;
            background: #f8f9ff; color: #3949ab;
        }
        .btn-login {
            background: linear-gradient(135deg, #1a237e, #3949ab);
            border: none; color: white; padding: 14px;
            border-radius: 14px; font-size: 16px; font-weight: 700;
            font-family: 'Cairo', sans-serif;
            width: 100%; transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,35,126,0.4); }
        .alert { border-radius: 12px; border: none; font-size: 14px; }
    </style>
</head>
<body>
<ul class="circles">
    <li></li><li></li><li></li><li></li><li></li>
</ul>
<div class="login-card">
    <div class="text-center mb-4">
        <div class="logo-wrap">
            <i class="fas fa-university fa-2x text-white"></i>
        </div>
        <h3 class="fw-800 mb-1" style="color:#1a237e">نظام شؤون الطلاب</h3>
        <p class="text-muted small">إدارة التسجيل والشؤون الطلابية الجامعية</p>
    </div>

    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-600 text-dark">اسم المستخدم</label>
            <div class="input-group">
                <input type="text" name="username" class="form-control" placeholder="أدخل اسم المستخدم" autofocus required>
                <span class="input-group-text" style="border-radius:0 12px 12px 0;border-right:0;border-left:2px solid #e0e0e0"><i class="fas fa-user"></i></span>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-600 text-dark">كلمة المرور</label>
            <div class="input-group">
                <input type="password" name="password" id="password" class="form-control" placeholder="أدخل كلمة المرور" required>
                <span class="input-group-text" style="border-radius:0 12px 12px 0;border-right:0;border-left:2px solid #e0e0e0;cursor:pointer" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></span>
            </div>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt me-2"></i>تسجيل الدخول</button>
    </form>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
    else { pwd.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
}
</script>
</body>
</html>
