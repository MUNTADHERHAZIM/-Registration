{% extends 'base/base.html' %}
{% block title %}تأكيد حذف المستخدم{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg">
            <div class="card-body text-center py-5">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle text-danger fa-4x"></i>
                </div>
                <h3 class="fw-bold mb-3">تأكيد الحذف</h3>
                <p class="text-muted mb-4">
                    هل أنت متأكد أنك تريد حذف المستخدم <strong class="text-dark">{{ target_user.username }}</strong>؟<br>
                    هذا الإجراء لا يمكن التراجع عنه.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="fas fa-trash-alt me-2"></i>تأكيد الحذف النهائي
                        </button>
                        <a href="{% url 'user_list' %}" class="btn btn-light px-4">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
