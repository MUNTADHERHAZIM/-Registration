{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}تغيير كلمة المرور{% endblock %}
{% block content %}
<div class="fade-in" style="max-width:500px;margin:0 auto">
<div class="card">
    <div class="card-header"><i class="fas fa-key text-warning me-2"></i>تغيير كلمة المرور</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-5">تغيير كلمة المرور</button>
                <a href="{% url 'profile' %}" class="btn btn-outline-secondary px-4">إلغاء</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
