{% extends 'base/base.html' %}
{% block title %}حذف طالب{% endblock %}
{% block content %}
<div class="fade-in" style="max-width:500px;margin:0 auto">
<div class="card border-danger">
    <div class="card-header bg-danger text-white"><i class="fas fa-exclamation-triangle me-2"></i>تأكيد الحذف</div>
    <div class="card-body text-center py-4">
        <i class="fas fa-user-times fa-4x text-danger mb-3"></i>
        <h5>هل تريد حذف الطالب؟</h5>
        <p class="text-muted">{{ student.full_name }}<br><code>{{ student.student_id }}</code></p>
        <div class="alert alert-warning text-start"><i class="fas fa-info-circle me-2"></i>سيتم حذف جميع بيانات الطالب بما فيها التسجيلات والدرجات</div>
        <form method="post" class="d-flex gap-2 justify-content-center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4"><i class="fas fa-trash me-2"></i>نعم، احذف</button>
            <a href="{% url 'student_detail' student.pk %}" class="btn btn-outline-secondary px-4">إلغاء</a>
        </form>
    </div>
</div>
</div>
{% endblock %}
